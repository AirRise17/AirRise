<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airise Clicker</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 180px;
            grid-template-rows: 1fr 1fr;
            font-family: sans-serif;
            font-size: 13px;
        }
        #clic {
            grid-column: 1;
            grid-row: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        #vente {
            grid-column: 1;
            grid-row: 2;
            padding: 14px 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 6px;
        }
        #stats {
            grid-column: 2;
            grid-row: 1 / span 2;
            padding: 10px;
            overflow-y: auto;
            border-left: 1px solid #ccc;
        }
        #logo { width: 260px; height: 260px; object-fit: contain; }
        #liens {
            margin-top: auto;
            padding-top: 14px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        #liens a {
            text-decoration: none;
            color: black;
            border: 1px solid #888;
            padding: 3px 10px;
            font-size: 12px;
            border-radius: 3px;
        }
        .titre {
            font-size: 11px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<script>
let argent = 0;
const prix_avion = 10;
let avions = 0;
let aeroports = 0;
let prix_aeroport = 100;
let aeroports_achetes = 0;
let recompense_aeroport = 0;
function maj() {
    document.getElementById("argent").innerText = "Airise Coins: " + argent;
    document.getElementById("avions").innerText = "Avions: " + avions;
    document.getElementById("aeroports").innerText = "Aeroports: " + aeroports;
}
function clic() {
    avions++;
    maj();
}
function vendre() {
    let qte = parseInt(document.getElementById("qte-vente").value);
    if (isNaN(qte) || qte <= 0) return;
    if (qte <= avions) {
        argent += qte * prix_avion;
        avions -= qte;
        maj();
    } else {
        alert("Vous n'avez pas assez d'avions à vendre !");
    }
}
function acheter() {
    let qte = parseInt(document.getElementById("qte-achat").value);
    if (isNaN(qte) || qte <= 0) return;
    let cout = qte * prix_aeroport;
    if (argent >= cout) {
        argent -= cout;
        aeroports += qte;
        aeroports_achetes += qte;
        maj();
    } else {
        alert("Pas assez d'Airise Coins !");
    }
}
recompense_aeroport = setInterval(() => {
    argent += aeroports_achetes * 2;
    maj();
}, 1000);
</script>

<div id="clic">
    <button onclick="clic()">Cliquer</button>
    <img id="logo" src="AIR 1.png" alt="Airise Logo">
</div>

<div id="stats">
    <p id="avions">Avions: 0</p>
    <p id="argent">Airise Coins: 0</p>
    <p id="aeroports">Aeroports: 0</p>
</div>

<div id="vente">
    <span class="titre">Acheter</span>
    <input type="number" id="qte-achat" placeholder="Qté aéroport">
    <button onclick="acheter()">Acheter aéroport</button>
    <span>100 Airise Coins</span>

    <span class="titre" style="margin-top:10px;">Vendre</span>
    <input type="number" id="qte-vente" placeholder="Combien vendre">
    <button onclick="vendre()">Vendre</button>
    <span>prix avion: 10 Airise Coins</span>

    <div id="liens">
        <a href="#">github</a>
        <a href="#">instagram</a>
        <a href="#">jsp</a>
    </div>
</div>

</body>
</html>
